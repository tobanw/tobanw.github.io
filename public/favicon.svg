<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TW">
  <style>
    .mark-bg {
      fill: #f7f8f7;
    }

    .mark-border {
      fill: none;
      stroke: #c8ceca;
      stroke-width: 2;
    }

    .mark-text {
      fill: #171717;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .mark-accent {
      fill: #0f766e;
    }

    @media (prefers-color-scheme: dark) {
      .mark-bg {
        fill: #171d1a;
      }

      .mark-border {
        stroke: #3b4943;
      }

      .mark-text {
        fill: #edf2ee;
      }

      .mark-accent {
        fill: #5cc3b6;
      }
    }
  </style>
  <rect class="mark-bg" x="3" y="3" width="58" height="58" rx="13" />
  <rect class="mark-border" x="4" y="4" width="56" height="56" rx="12" />
  <rect class="mark-accent" x="18" y="47" width="28" height="4" rx="2" />
  <text class="mark-text" x="32" y="38" text-anchor="middle">TW</text>
</svg>
